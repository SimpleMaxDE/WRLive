name: Daten-Sync

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run sync:patch
      - run: npm run sync:champions
      - run: npm run sync:items
      - run: npm run sync:runes
      - run: npm run sync:ranking
      - run: npm run rebuild:tierlist
